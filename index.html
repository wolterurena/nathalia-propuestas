<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathalia — Propuestas de diseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;1,400&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:'Outfit', sans-serif;
    background: #fdf6f2;
    color:#4a3539;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 4rem 6vw;
  }
  .wrap{ max-width: 1000px; width:100%; text-align:center; }
  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    margin-bottom: 0.6rem;
  }
  h1 em{ font-style:italic; color:#a8606c; }
  p.sub{ color:#8a7a7e; margin-bottom: 3rem; font-size:1.05rem; }
  .grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.6rem;
  }
  .card{
    display:block;
    background:#fff;
    border-radius: 20px;
    padding: 2.2rem 1.6rem;
    text-decoration:none;
    color:#4a3539;
    box-shadow: 0 12px 30px rgba(168,96,108,0.08);
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .card:hover{ transform: translateY(-6px); box-shadow: 0 18px 40px rgba(168,96,108,0.14); }
  .swatch{
    height: 70px;
    border-radius: 12px;
    margin-bottom: 1.2rem;
  }
  .s1{ background: linear-gradient(135deg, #f7e3e0, #c9818c); }
  .s2{ background: linear-gradient(135deg, #e6dcf6, #8a6fa3); }
  .s3{ background: linear-gradient(135deg, #ffd9c2, #e0875c); }
  .s4{ background: linear-gradient(135deg, #d8a8b0, #8a5b63); }
  .card h2{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size: 1.25rem;
    margin-bottom: 0.4rem;
  }
  .card span{
    font-size: 0.9rem;
    color:#998a8e;
  }
  @media (max-width: 1000px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px){
    .grid{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Propuestas para <em>Nathalia</em></h1>
    <p class="sub">Elige el diseño que más te guste — luego lo ajustamos a tu gusto.</p>
    <div class="grid">
      <a class="card" href="salon-aura.html">
        <div class="swatch s1"></div>
        <h2>Opción 1 · Rosa & Crema</h2>
        <span>Suave y romántico</span>
      </a>
      <a class="card" href="nathalia-lavanda.html">
        <div class="swatch s2"></div>
        <h2>Opción 2 · Lavanda Editorial</h2>
        <span>Elegante, estilo revista</span>
      </a>
      <a class="card" href="nathalia-durazno.html">
        <div class="swatch s3"></div>
        <h2>Opción 3 · Durazno Orgánico</h2>
        <span>Cálido y juguetón</span>
      </a>
      <a class="card" href="nathalia-slider.html">
        <div class="swatch s4"></div>
        <h2>Opción 4 · Hero con Slider</h2>
        <span>Dinámico, a pantalla completa</span>
      </a>
    </div>
  </div>
</body>
</html>
